      summary: Run precheck
      operationId: Run precheck
      description: >-
        Simple operation for customer preliminary scoring.

        Returns a possible credit amount the customer can obtain. It is best suitable for identifying clients who will probably be rejected. Take into account that positive recommendation can not guarantee customer's approval as the result is based only on a few elementary pieces of information about the customer.


        Resource has to be called with valid access token (see the [Security section](#reference/security)) from your server. If you plan to integrate it in a client flow, you should implement REST endpoint bound to your shopping basket session that will be used as a proxy to call HC API - **NEVER put access token directly to client side**.


        Possible error codes explanation:

        | Status code | Code                | Explanation                                                                     |

        | ---         | ---                 | ---                                                                             |

        | 400         | INVALID_REQUEST     | Request was not well formatted (malformed request syntax, size too large, etc.) |

        | 500         | FAILURE             | Internal failure                                                                |
      tags:
        - Scoring resources
      requestBody:
        content:
          application/json;charset=UTF-8:
            schema:
              type: object
              properties:
                customer:
                  type: object
                  properties:
                    firstName:
                      type: string
                      description: Customer first (given) name. String values longer than 100
                        characters will be shortened to 100 characters.
                    lastName:
                      type: string
                      description: Customer last (family) name. String values longer than 100
                        characters will be shortened to 100 characters.
                    email:
                      type: string
                      description: E-mail address of customer. MUST be valid email according to [RFC
                        2822](https://tools.ietf.org/html/rfc2822).
                    phone:
                      type: string
                      description: Mobile phone number with country code (including leading `+`).
                    externalId:
                      type: string
                      description: Unique customer's identifier in partner's system. Typically used
                        for linking request and response together.
                  required:
                    - firstName
                    - lastName
                    - email
                    - phone
                    - externalId
                  description: Customer data
              required:
                - customer
              example:
                customer:
                  firstName: John
                  lastName: Newborn
                  email: john.newborn@country.com
                  phone: "+420777123456"
                  externalId: "1576849"
