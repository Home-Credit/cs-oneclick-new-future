      summary: Change application order
      operationId: Change application order
      description: >-
        When there's some changes within *order* that may have an important
        impact on the repayment process after its submission, use
        `/financing/v1/applications/{applicationId}/order` resource in order we
        can adjust everything properly. `{applicationId}` is the application ID
        you received in the response of `/financing/v1/applications` after its
        creation.


        | Financing type     | Supported  |

        | ---                | ---        |

        | `INSTALLMENT`      | YES        |


        | Application state | Availability                                                          |

        | ---               | ---                                                                   |

        | `REJECTED`        | NO                                                                    |

        | `CANCELLED`       | NO                                                                    |

        | `PROCESSING`      | YES                                                                   |

        | `READY`           | YES* (see the [availability note bellow](#change-order-availability)) |


        Use `/financing/v1/applications/{applicationId}/order` resource with properly filled request that contains (only) changed data (resource allows partial put).

        <a name="change-order-availability"></a>

        > **AVAILABILITY NOTE:** Valid request object contains only order number (`order.number`) and/or one item in the array `order.variableSymbols[]`. Supported `stateReason` of `state READY` are `READY_TO_SHIP`, `READY_SHIPPED`, `READY_DELIVERING` (`state PROCESSING` is supported without any limitations).


        If the request was successfully processed, you receive HTTP status code 200 and object of information about changed *order* plus basic information about respective *application* (ID, state, substate) with at least following information in the response:

        - Order number

        - Order total price (including VAT)

        - Order items (array)
          - Order item name
          - Total price (all pieces, including VAT)
          - Order item state
        - Order state

        - Application basic information
          - ID
          - Application state
          - Application substate

        In other cases, you receive one of the following errors:

        | Status code | Code                   | Explanation                                                                       |

        | ---         | ---                    | ---                                                                               |

        | 400         | INVALID_REQUEST        | Request was not well formatted (malformed request syntax, size too large, etc.)   |

        | 404         | OBJECT_NOT_FOUND       | The requested resource could not be found                                         |

        | 422         | NOT_SUPPORTED          | Resource is not supported for given financing type                                |

        | 422         | UNPROCESSABLE          | The request was well-formed but was unable to be followed due to semantic errors  |

        | 422         | DUPLICATE_ORDER_NUMBER | Change to already existing order number of not cancelled order is not allowed     |

        | 500         | INTERNAL_SERVER_ERROR  | Unexpected condition was encountered and no more specific message is suitable     |



        + Parameters
            + applicationId (string, required, `01-11b00a1ef1`)

        Change *order*. Used to change order number and/or variable symbol.
      tags:
        - Application resources
      parameters:
        - name: applicationId
          in: path
          description: ""
          required: true
          example: 01-11b00a1ef1
          schema:
            type: string
      requestBody:
        content:
          application/json;charset=UTF-8:
            schema:
              type: object
              properties:
                order:
                  type: object
                  properties:
                    number:
                      type: string
                      description: Order number (internal for e-shop), empty string is not allowed.
                    variableSymbols:
                      type: array
                      items:
                        anyOf:
                          - type: string
                          - type: string
                      description: Variable symbols (internal for e-shop)
                  description: Changed order data.
                reason:
                  type: string
                  description: Reason of change.
              required:
                - order
              example:
                order:
                  number: AA234
                  variableSymbols:
                    - "123456"
                    - "1234567"
