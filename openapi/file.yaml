            be provided if known. String values longer than 100 characters will
            be shortened to 100 characters.
        lastName:
          type: string
          example: Newborn
          description: Customer last (family) name. Must be paired with `firstName`.
            SHOULD be provided if known. String values longer than 100
            characters will be shortened to 100 characters.
        fullName:
          type: string
          example: Ing. John Newborn, Csc.
          description: Customer full name, including academical degrees and salutation.
            Attribute `fullName` is parsed (and eventually shortened) into
            `firstName` and `lastName`; `fullName` is never returned in
            response.
        email:
          type: string
          example: john.newborn@country.com
          description: E-mail address of customer. Must be valid email according to [RFC
            2822](https://tools.ietf.org/html/rfc2822).
        phone:
          type: string
          example: "+420777123456"
          description: Mobile phone number with country code (including leading `+`)
        addresses:
