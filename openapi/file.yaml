    Multi_precheck_result_notification: {}
    _OBSOLETE_Precheck: {}
    Installment_programs_offers: {}
    Installment_programs: {}
    Installment_programs_down_payments: {}
    API_status_check: {}
    API_health_check: {}
    Application_notification: {}
    Change_application_state_-_integration_usage_only: {}
