                        and EUR in Slovakia).
                  required:
                    - amount
                    - currency
                  description: Order price
                downPayment:
                  type: object
                  properties:
                    amount:
                      type: number
                      description: Amount in minor units [ISO
                        4217](https://en.wikipedia.org/wiki/ISO_4217)
                    currency:
                      type: string
                      description: Amount currency [ISO 4217](https://en.wikipedia.org/wiki/ISO_4217).
                        Only local currency is allowed (CZK in Czech Republic
                        and EUR in Slovakia).
                  required:
                    - amount
                    - currency
                  description: Down payment amount (default is 0, amount should be rounded to
                    hundreds)
              required:
                - price
              example:
                productSetCode: COCHCONL
                price:
                  amount: 133000
                  currency: CZK
                downPayment:
                  amount: 0
                  currency: CZK
