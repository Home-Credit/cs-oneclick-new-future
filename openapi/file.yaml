      summary: Cancel application
      operationId: Cancel application
      description: >-
        If there is need to completely cancel customer's *order*, it is
        necessary to cancel respective *application*. For this purpose use
        `/financing/v1/applications/{applicationId}/cancel` resource where
        `{applicationId}` is the *application* ID you received in the response
        of `/financing/v1/applications` after its creation.


        | Financing type     | Supported |

        | ---                | ---       |

        | `INSTALLMENT`      | YES       |


        | Application state | Availability |

        | ---               | ---          |

        | `REJECTED`        | NO           |

        | `CANCELLED`       | YES          |

        | `PROCESSING`      | YES          |

        | `READY`           | YES          |


        If the request was successfully processed but the *application* had been already paid (`Application.stateReason = READY_PAID`) you receive HTTP status code **202 ACCEPTED** that means the process of a cancelation of the *application* began. It SHOULD be completed after fulfilment of several back office manual actions.


        In other cases, when the request is successfully processed, you receive HTTP status code **200 OK**.


        You also receive at least following information about (soon to be) cancelled *application* in the response:

        - Application unique ID

        - Application type

        - Application state

        - Application substate


        In other cases, you receive one of the following errors:

        | Status code | Code                  | Explanation                                                                      |

        | ---         | ---                   | ---                                                                              |

        | 400         | INVALID_REQUEST       | Request was not well formatted (malformed request syntax, size too large, etc.)  |

        | 404         | OBJECT_NOT_FOUND      | The requested resource could not be found                                        |

        | 422         | NOT_SUPPORTED         | Resource is not supported for given financing type                               |

        | 422         | UNPROCESSABLE         | The request was well-formed but was unable to be followed due to semantic errors |

        | 422         | APPLICATION_REJECTED  | When you try to cancel already `REJECTED` `Application`, which is not allowed    |

        | 500         | INTERNAL_SERVER_ERROR | Unexpected condition was encountered and no more specific message is suitable    |



        + Parameters
            + applicationId (string, required, `01-11b00a1ef1`)

        Cancel *application*.
      tags:
        - Application resources
      parameters:
        - name: applicationId
          in: path
          description: ""
          required: true
          example: 01-11b00a1ef1
          schema:
            type: string
      requestBody:
        content:
          application/json;charset=UTF-8:
            schema:
              type: object
              properties:
                reason:
                  type: string
                  enum:
                    - APPLICATION_CANCELLED_CARRIER_CHANGED
                    - APPLICATION_CANCELLED_CART_CONTENT_CHANGED
                    - APPLICATION_CANCELLED_BY_CUSTOMER
                    - APPLICATION_CANCELLED_BY_ERP
                    - APPLICATION_CANCELLED_EXPIRED
                    - APPLICATION_CANCELLED_UNFINISHED
                    - APPLICATION_CANCELLED_BY_ESHOP_RULES
                    - APPLICATION_CANCELLED_OTHER
                  description: Reason of cancellation. Considered as `APPLICATION_CANCELLED_OTHER`
                    if not set.
                customReason:
                  type: string
                  description: Specification of `APPLICATION_CANCELLED_OTHER` reason
              example:
                reason: APPLICATION_CANCELLED_CARRIER_CHANGED
