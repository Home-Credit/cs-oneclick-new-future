        rejectedRedirect:
          type: string
          example: https://www.youreshop.cz/kosik
          description: URL of the partner used for redirection of the customer back to
            partner website (from HCO gateway) after application rejection.  Do
            not implement any business logic on accessing this URL by customer.
            Implement business logic to REJECTED notification via
            `notificationEndpoint`. Must be valid URL according to [RFC
            3986](https://tools.ietf.org/html/rfc3986). Maximum 1000 characters.
        notificationEndpoint:
          type: string
          example: https://www.youreshop.cz/order/AA234
          description: URL of the partner used as a notification endpoint for providing
            important updates about application (approval, rejection, storno,
            etc.). Must be valid URL according to [RFC
            3986](https://tools.ietf.org/html/rfc3986). Maximum 1000 characters.
    ScoringData:
      type: object
      required:
        - customer
      properties:
        customer:
          $ref: "#/components/schemas/PrecheckCustomer"
    PrecheckCustomer:
      type: object
      required:
        - firstName
        - lastName
        - email
        - phone
        - externalId
      properties:
        firstName:
          type: string
          example: John
          description: Customer first (given) name. String values longer than 100
            characters will be shortened to 100 characters.
        lastName:
          type: string
          example: Newborn
          description: Customer last (family) name. String values longer than 100
            characters will be shortened to 100 characters.
        email:
          type: string
          example: john.newborn@country.com
          description: E-mail address of customer. MUST be valid email according to [RFC
            2822](https://tools.ietf.org/html/rfc2822).
        phone:
          type: string
          example: "+420777123456"
          description: Mobile phone number with country code (including leading `+`).
        externalId:
          type: string
          example: "1576849"
          description: Unique customer's identifier in partner's system. Typically used
            for linking request and response together.
    PrecheckResult:
      type: object
      required:
        - id
        - customer
        - potentialCreditAmount
      properties:
        id:
          type: string
          example: "1234"
          description: Unique identificator of Precheck. Send this identificator in
            ApplicationRequest to improve approval rate.
        customer:
          $ref: "#/components/schemas/PrecheckCustomer"
        potentialCreditAmount:
          $ref: "#/components/schemas/AmountOld"
    MultiPrecheckRequest:
      type: object
      required:
        - scoringData
      properties:
        scoringData:
          type: array
          items:
            $ref: "#/components/schemas/ScoringData"
        notificationEndpoint:
          type: string
          example: https://www.youreshop.cz/multiPrecheck/results
          description: URL of the partner used as a notification endpoint for providing
            information about result of multi precheck. Must be valid URL
            according to [RFC 3986](https://tools.ietf.org/html/rfc3986).
            Maximum 1000 characters.
    MultiPrecheckResponse:
      type: object
      required:
        - id
      properties:
        id:
          type: string
          description: Unique identifier of multi precheck's batch.
    BatchNotification:
      type: object
      required:
        - id
        - status
      properties:
        id:
          type: string
          description: Unique identifier of multi precheck's batch.
        status:
          type: string
          enum:
            - SUCCESS
            - PARTIAL_SUCCESS
            - FAILURE
          description: Result of the precheck's batch.
    MultiPrecheckResult:
      type: object
      required:
        - id
        - status
      properties:
        id:
          type: string
          description: Unique identifier of multi precheck's batch.
        status:
          type: string
          enum:
            - SUCCESS
            - PARTIAL_SUCCESS
            - FAILURE
            - PROCESSING
          description: Result of the precheck's batch.
        data:
          type: array
          items:
            $ref: "#/components/schemas/PrecheckResult"
          description: REQUIRED if precheck ended with `SUCCESS` or `PARTIAL_SUCCESS`
    InstallmentPrograms:
      type: object
      required:
        - installmentPrograms
      properties:
        installmentPrograms:
          type: array
          items:
            $ref: "#/components/schemas/InstallmentProgram"
          description: Array with installment programs offer
    InstallmentProgram:
      type: object
      required:
        - productCode
      properties:
        productCode:
          type: string
          example: COCONL06
          description: Installment program product code
        type:
          type: string
          enum:
            - MINIMAL
            - FAVOURITE
            - OTHER
          description: DEPRECATED. Do not use this attribute, use attribute `flags`
            instead. Attribute `type` remains in API for backward compatibility
        flags:
          type: array
          items:
            $ref: "#/components/schemas/InstallmentProgramFlag"
          description: Installment program flag. Multiple flags for one program are allowed.
        installment:
          allOf:
            - $ref: "#/components/schemas/AmountOld"
            - type: object
              required:
                - amount
              properties:
                amount:
                  type: number
                  example: 221900
                  description: Amount in minor units (250000 represents 2500 CZK/EUR) [ISO
                    4217](https://en.wikipedia.org/wiki/ISO_4217)
          description: monthly installment amount
        numberOfInstallments:
          type: number
          example: 6
          description: installment count
    InstallmentProgramDetail:
      allOf:
        - $ref: "#/components/schemas/InstallmentProgram"
        - type: object
          properties:
            detail:
              $ref: "#/components/schemas/CalculationDetail"
    InstallmentProgramFlag:
      type: object
      required:
        - type
      properties:
        type:
          type: string
          enum:
            - MINIMAL
            - FAVOURITE
            - DELAY_FIRST_INSTALLMENT
            - BENEFIT
            - OTHER
          description: Flag type
        delayFirstInstallment:
          type: number
          example: 2
          description: The number of months for which the installment will be postponed.
            Required for `DELAY_FIRST_INSTALLMENT` flag.
        benefit:
          type: string
          example: TURBO
          description: Type of benefit. Required for `BENEFIT` flag.
    CalculationDetail:
      type: object
      properties:
        installmentDay:
          type: number
          example: 20
          description: Installment date (day in month)
        installmentFirstDate:
          type: string
          example: 2018-09-20
          description: Date of the first installment
        installmentLastDate:
          type: string
          example: 2019-02-20
          description: Date of the last installment
        annualInterestRate:
          type: number
          example: 0.1743
          description: Annual interest rate
        predictedProvisionDate:
          type: string
          example: 2018-08-10
          description: Predicted provision date
        paidBack:
          allOf:
            - $ref: "#/components/schemas/AmountOld"
            - type: object
              required:
                - amount
              properties:
                amount:
                  type: number
                  example: 1331400
                  description: Amount in minor units (250000 represents 2500 CZK/EUR) [ISO
                    4217](https://en.wikipedia.org/wiki/ISO_4217)
          description: Total amount paid by customer
        rpsn:
          type: number
          example: 0.19
          description: RPSN
        legalline:
          type: string
          example: '"Každou žádost posuzujeme individuálně a uvedené hodnoty jsme vám
            spočítali na míru.\nPlatí pro čerpání k 10.08.2018, datum první
            splátky je k 20.09.2018 a datum dalších splátek vždy k 20. dni v
            měsíci, počínaje 20.10.2018 a při lhůtě splatnosti 20.02.2019."'
          description: Text interpretation of the offer
    InstallmentProgramsDownPayments:
      type: object
      properties:
        minimum:
          allOf:
            - $ref: "#/components/schemas/AmountOld"
            - type: object
              required:
                - amount
              properties:
                amount:
                  type: number
                  description: Amount in minor units [ISO
                    4217](https://en.wikipedia.org/wiki/ISO_4217)
          description: The lowest down payment amount, e.g. 0 (0 CZK/EUR)
        maximum:
          allOf:
            - $ref: "#/components/schemas/AmountOld"
            - type: object
              required:
                - amount
              properties:
                amount:
                  type: number
                  example: 250000
                  description: Amount in minor units (250000 represents 2500 CZK/EUR) [ISO
                    4217](https://en.wikipedia.org/wiki/ISO_4217)
          description: Maximum down payment amount, e.g. 2500 (2 500 CZK/EUR)
        step:
          allOf:
            - $ref: "#/components/schemas/AmountOld"
            - type: object
              required:
                - amount
              properties:
                amount:
                  type: number
                  example: 50000
                  description: Amount in minor units (50000 represents 500 CZK/EUR) [ISO
                    4217](https://en.wikipedia.org/wiki/ISO_4217)
          description: "Size of one step between the lowest and maximum down payment
            amounts, e.g. 500 (500 CZK/EUR). Available down payments could be
            (min 0, max 2500): 0, 500, 1000, 1500, 2000, 2500"
    InstallmentProgramsRequest:
      type: object
      required:
        - productCode
        - price
      properties:
        productCode:
          type: string
          example: COCONL06
          description: Product code, this indicates previous calculation result
        price:
          $ref: "#/components/schemas/AmountOld"
        downPayment:
          allOf:
            - $ref: "#/components/schemas/AmountOld"
            - type: object
              required:
                - amount
              properties:
                amount:
                  type: number
                  description: Amount in minor units [ISO
                    4217](https://en.wikipedia.org/wiki/ISO_4217)
          description: Down payment amount (default is 0, amount should be rounded to
            hundreds)
    InstallmentProgramsOffersRequest:
      type: object
      required:
        - price
      properties:
        productSetCode:
          type: string
          example: COCHCONL
          description: Product set code, this will limit further calculations. If not
            provided, default productSet will be used.
        price:
          $ref: "#/components/schemas/AmountOld"
        downPayment:
          allOf:
            - $ref: "#/components/schemas/AmountOld"
            - type: object
              required:
                - amount
              properties:
                amount:
                  type: number
                  description: Amount in minor units [ISO
                    4217](https://en.wikipedia.org/wiki/ISO_4217)
          description: Down payment amount (default is 0, amount should be rounded to
            hundreds)
    InstallmentProgramsDownPaymentsRequest:
      type: object
      required:
        - productSetCode
        - price
      properties:
        productSetCode:
          type: string
          example: COCHCONL
          description: Product set code, this will limit further calculations
        price:
          $ref: "#/components/schemas/AmountOld"
    ApiInfo:
      type: object
      required:
        - build
      properties:
        build:
          type: object
          required:
            - version
            - artifact
            - name
            - group
            - time
          properties:
            version:
              type: string
              example: 38.3.0-0-SNAPSHOT
              description: ATL version
            artifact:
              type: string
              example: atl-cs-app
              description: Maven artifact name
            name:
              type: string
              example: ATL CS - App
              description: Official artifact name (human readable)
            group:
              type: string
              example: eu.homecredit.openapi-cs
              description: Artifact group name
            time:
              type: number
              example: 1510739838000
              description: Artifact (build) creation time (timestamp)
    NotificationRequest:
      allOf:
        - $ref: "#/components/schemas/ApplicationBase"
        - type: object
          required:
            - orderNumber
            - notificationDate
            - orderState
            - downPayment
            - sentDate
            - checkSum
            - sequenceNumber
          properties:
            orderNumber:
              type: string
              example: AA234
              description: Order number (internal for e-shop)
            notificationDate:
              type: string
              example: 2017-07-15T00:00:00+02:00
            orderState:
              type: string
              enum:
                - PROCESSING
                - SENT
                - DELIVERED
                - RETURNED
                - CANCELLED
              description: Order state.
            downPayment:
              allOf:
                - $ref: "#/components/schemas/AmountOld"
                - type: object
                  required:
                    - amount
                  properties:
                    amount:
                      type: number
                      example: 300000
                      description: Amount in minor units (300000 represents 3 000) [ISO
                        4217](https://en.wikipedia.org/wiki/ISO_4217)
              description: Current down payment set by a customer
            sentDate:
              type: string
              example: 2017-07-16T00:00:00+02:00
            checkSum:
              type: string
              example: 443E150D3406F6A8DC62C1DB224AFDD84FA9907071BB1AD9B2C7701031793662191501B26AADF3A31361341EA176C80B23D8A9A5E5B5219538289945FE0C20A7
            sequenceNumber:
              type: number
              example: 1
              description: Sequence number of notification for corresponding application.
                Starts at value of 1.
    IntegrationChangeStateRequest:
      type: object
      required:
        - stateReason
      properties:
        stateReason:
          type: string
          enum:
            - REJECTED
            - PROCESSING_APPROVED
            - PROCESSING_SIGNED
            - READY_TO_SHIP
            - READY_DELIVERED
            - READY_PAID
            - CANCELLED_NOT_PAID
            - CANCELLED_RETURNED
          description: Describes internal state of application, e.g. when state is
            PROCESSING - reason why application remains in processing state
    ObsoletePrecheckRequest:
      type: object
      required:
        - customer
      properties:
        customer:
          $ref: "#/components/schemas/Customer"
    ObsoletePrecheckResult:
      type: object
      required:
        - id
        - recommendation
      properties:
        id:
          type: string
          example: "1234"
          description: Unique identificator of Precheck. Send this identificator in
            ApplicationRequest for better approval rate.
        recommendation:
          type: boolean
          description: |-
            A recommendation of whether the order should be passed to the HCO.

                true = Application is likely going to be approved.
            false = Application is likely going to be rejected.
        message:
          type: string
          example: V HCO peněžence nemáte dostatečný limit.
          description: Custom message for customer.
    ErrorNotFound:
      allOf:
        - $ref: "#/components/schemas/Error"
        - type: object
          required:
            - code
            - message
          properties:
            code:
              type: string
              example: APPLICATION_NOT_FOUND
              description: Unique internal error code
            message:
              type: string
              example: Application 'NONEXISTING_APPLICATION' not found
              description: Human readable error description (non-localized)
    ErrorsNotFound:
      type: object
      required:
        - errors
      properties:
        errors:
          type: array
          items:
            $ref: "#/components/schemas/ErrorNotFound"
          description: Array with errors
    ErrorNotSupported:
      allOf:
        - $ref: "#/components/schemas/Error"
        - type: object
          required:
            - code
            - message
          properties:
            code:
              type: string
              example: NOT_SUPPORTED
              description: Unique internal error code
            message:
              type: string
              example: Current application status not allows requested operation
              description: Human readable error description (non-localized)
    ErrorsNotSupported:
      type: object
      required:
        - errors
      properties:
        errors:
          type: array
          items:
            $ref: "#/components/schemas/ErrorNotSupported"
          description: Array with errors
    AmountOld:
      type: object
      required:
        - amount
        - currency
      properties:
        amount:
          type: number
          example: 133000
          description: Amount in minor units (133000 represents 1330) [ISO
            4217](https://en.wikipedia.org/wiki/ISO_4217)
        currency:
          type: string
          example: CZK
          description: Amount currency [ISO 4217](https://en.wikipedia.org/wiki/ISO_4217).
            Only local currency is allowed (CZK in Czech Republic and EUR in
            Slovakia).
    VatAmountOld:
      type: object
      required:
        - amount
        - currency
        - vatRate
      properties:
        amount:
          type: number
          example: 14950
          description: Amount in minor units (14950 represents 149,50) [ISO
            4217](https://en.wikipedia.org/wiki/ISO_4217). MUST be 0 or greater.
        currency:
          type: string
          example: CZK
          description: Amount currency [ISO 4217](https://en.wikipedia.org/wiki/ISO_4217).
            Only local currency is allowed (CZK in Czech Republic and EUR in
            Slovakia).
        vatRate:
          type: number
          example: 15
          description: VAT rate as natural number (15 represents 15% rate)
    Error:
      type: object
      required:
        - code
        - message
        - severity
      properties:
        code:
          type: string
          example: BAD_REQUEST
          description: Unique internal error code
        message:
          type: string
          example: Bad request
          description: Human readable error description (non-localized)
        severity:
          type: string
          enum:
            - ERROR
            - WARN
            - INFO
        attribute:
          type: string
          example: Client.addresses[1].streetNumber
          description: JSON path of request attribute that caused the error (if applicable)
        ticketId:
          type: string
          example: UAT1:AMS:20160516-091658.450:45e4
          description: Internal ticket ID, used for error backtracking
    Errors:
      type: object
      required:
        - errors
      properties:
        errors:
          type: array
          items:
            $ref: "#/components/schemas/Error"
          description: Array with errors
    OTPErrors:
      allOf:
        - $ref: "#/components/schemas/Errors"
        - type: object
          properties:
            blockedUntil:
              type: string
              example: 2017-01-18T10:34:44+01:00
              description: requested operation is blocked until specified time
    PagingInfo:
      type: object
      required:
        - itemsPerPage
      properties:
        itemsPerPage:
          type: number
          example: 10
          description: number of items per page
        nextPage:
          type: string
          example: transactions?sort=category&limit=10&after=30
          description: request to retrieve next page, if it exists and can be
            unambiguously specified
        prevPage:
          type: string
          example: transactions?sort=category&limit=10&before=21
          description: request to retrieve previous page, if it exists and can be
            unambiguously specified
    Amount:
      type: object
      required:
        - value
        - currency
      properties:
        value:
          type: number
          example: 13300
          description: Amount in minor units (13300 represents 133) [ISO
            4217](https://en.wikipedia.org/wiki/ISO_4217)
        currency:
          type: string
          example: CZK
          description: Amount currency [ISO 4217](https://en.wikipedia.org/wiki/ISO_4217).
            Only local currency is allowed (CZK in Czech Republic and EUR in
            Slovakia).
    VatAmount:
      type: object
      required:
        - value
        - currency
        - vatRate
      properties:
        value:
          type: number
          example: 14950
          description: Amount in minor units (14950 represents 149,50) [ISO
            4217](https://en.wikipedia.org/wiki/ISO_4217). MUST be 0 or greater.
        currency:
          type: string
          example: CZK
          description: Amount currency [ISO 4217](https://en.wikipedia.org/wiki/ISO_4217).
            Only local currency is allowed (CZK in Czech Republic and EUR in
            Slovakia).
        vatRate:
          type: number
          example: 15
          description: VAT rate as natural number (15 represents 15% rate)
    File:
      type: object
      required:
        - filename
      properties:
        filename:
          type: string
          example: iphone6s.jpg
          description: File name.
    EmptyRE:
      type: object
      properties: {}
    KeyValue:
      type: object
      required:
        - key
        - value
      properties:
        key:
          type: string
          example: property
          description: Key
        value:
          type: string
          example: value
          description: Value
    BankAccount:
      type: object
      required:
        - type
      properties:
        type:
          type: string
          enum:
            - IBAN
            - NATIONAL
          description: Account type
    AccountIBAN:
      type: object
      required:
        - iban
      properties:
        iban:
          type: string
          example: CZ6508000000192000145399
          description: Account number in IBAN format
    AccountNational:
      type: object
      required:
        - accountNumber
        - bankCode
      properties:
        prefix:
          type: string
          example: "000000"
          description: Account number prefix. For domestic accounts, this will be
            specified in national format.
        accountNumber:
          type: string
          example: "1235335010"
          description: Account number. For domestic accounts, this will be specified in
            national format.
        bankCode:
          type: string
          example: "3030"
          description: For domestic accounts, bank code in national format
    PhoneNumber:
      type: object
      required:
        - number
      properties:
        number:
          type: string
          example: "+420123456789"
          description: Phone number (including country code)
    Email:
      type: object
      required:
        - address
      properties:
        address:
          type: string
          example: darth.vader@empire.sw
          description: Email address
    PartnerLogin:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
          example: eShop
          description: Partner username
        password:
          type: string
          example: eShopSecretPassword
          description: Partner secret password
    PartnerLoginResult:
      type: object
      required:
        - accessToken
      properties:
        accessToken:
          type: string
          example: TokenForPartnerTokenForPartnerTokenForPartnerTokenForPartner
          description: Access token
        expiresIn:
          type: number
          example: 7200
          description: Token validity remaining time (in seconds)
    Login_partner: {}
    Create_application: {}
    Application_detail: {}
    Cancel_application: {}
    Change_application_order: {}
