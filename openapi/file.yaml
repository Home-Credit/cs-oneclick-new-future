                        severity: ERROR
                        attribute: Client.addresses[1].streetNumber
                        ticketId: UAT1:AMS:20160516-091658.450:45e4
      summary: Create application
      operationId: Create application
      description: >-
        Elementary flow starts when customer wants to use one of Home Credit's
        payment method for financing his purchase made in partner e-shop.


        | Financing type     | Supported |

        | ---                | ---       |

        | `INSTALLMENT`      | YES       |



        Use `/financing/v1/applications` resource with properly filled request that contains at least following data

        - Customer information is not necessary to send, however, sending them is highly recommended, it will simplify the application process for the customer:
          - Name (first name and last name or full name)
          - E-mail
          - Mobile phone number
          - Addresses (array)
            - City
            - Street
            - Street number
            - ZIP
            - Address type
        - Order details
          - Number
          - Total Price (including VAT)
          - Order items (array, at least one item is required)
            - Code
            - Order item name
            - Total price (all pieces, including VAT)
        - Financing type (always `INSTALLMENT`)

        - Financing type details
          - \*Installment settings - preferred installment amount
          - \*Installment settings - preferred down payment amount
          - \*Installment settings - installment program product code
        - Additional information necessary for the continuation and completion of the process
          - Your URL where the customer should be redirected after application approval
          - Your URL where the customer should be redirected after application rejection
          - URL of your notification endpoint you want us to send notifications about particular application updates to (in case the partner is using notifier)
        > \* = Must be filled properly in case customer has already used installment calculator embedded on your website and selected preferred installment program. See the [Installments calculator resources section](#reference/installments-calculator-resources) for more details about possibility to embed installment calculator on your website. Leave empty otherwise.


        If the request was successfully processed, you receive HTTP status code 201 and `Application` object with at least following information in the response:

        - Application unique ID

        - Application state

        - Application substate

        - Gateway redirect URL where you should redirect a customer after processing of the response


        > You may also receive information about initially requested **down payment** - this can be later changed by customer during the process of finalization of financing application. In such cases we recommend you to check the final **down payment** of approved loan (after the *application* is approved) via `/financing/v1/applications/{applicationId}`.


        If the request was **recognized as duplication**

        - and previously created `Application` is canceled (`Application.state = CANCELLED` and `Application.stateReason = CANCELLED_NOT_PAID`), new `Application` is created, you receive HTTP status code 201 and `Application` object with information specified above (at least) in the response

        - and previously created `Application` is still new (i.e. without any recorded action by a client), no `Application` is created, you receive HTTP status code 200 and the `Application` object created during the first related successful resource call.

        - and previously created `Application` is neither canceled nor new anymore, you receive HTTP status code 422 with error code `DUPLICATE_ORDER_NUMBER`.


        In case of an error, you receive one of the following results:

        | Status code | Code                   | Explanation                                                                     |

        | ---         | ---                    | ---                                                                             |

        | 400         | INVALID_REQUEST        | Request was not well formatted (malformed request syntax, size too large, etc.) |

        | 422         | UNPROCESSABLE          | Request was well-formed but was unable to be followed due to semantic errors    |

        | 422         | DUPLICATE_ORDER_NUMBER | Creating of Application with duplicated Order number is not allowed             |

        | 500         | INTERNAL_SERVER_ERROR  | Unexpected condition was encountered and no more specific message is suitable   |


        Create new *application* of particular financing type
      tags:
        - Application resources
      requestBody:
        content:
          application/json;charset=UTF-8:
            schema:
              type: object
              properties:
                customer:
                  type: object
                  properties:
                    firstName:
                      type: string
                      description: Customer first (given) name. Must be paired with `lastName`. SHOULD
                        be provided if known. String values longer than 100
                        characters will be shortened to 100 characters.
                    lastName:
                      type: string
                      description: Customer last (family) name. Must be paired with `firstName`.
                        SHOULD be provided if known. String values longer than
                        100 characters will be shortened to 100 characters.
                    fullName:
                      type: string
                      description: Customer full name, including academical degrees and salutation.
                        Attribute `fullName` is parsed (and eventually
                        shortened) into `firstName` and `lastName`; `fullName`
                        is never returned in response.
                    email:
                      type: string
                      description: E-mail address of customer. Must be valid email according to [RFC
                        2822](https://tools.ietf.org/html/rfc2822).
                    phone:
                      type: string
                      description: Mobile phone number with country code (including leading `+`)
                    addresses:
                      type: array
                      items:
                        type: object
                        properties:
                          name:
                            type: string
                            description: Name on addres. Maximum 90 characters.
                          city:
                            type: string
                            description: City. String values longer than 100 characters will be shortened to
                              100 characters.
                          streetAddress:
                            type: string
                            description: Street/city part. String values longer than 100 characters will be
                              shortened to 100 characters.
                          streetNumber:
                            type: string
                            description: Street number. String values longer than 50 characters will be
                              shortened to 50 characters.
                          zip:
                            type: string
                            description: Postal code. String values longer than 10 characters will be
                              shortened to 10 characters.
                          addressType:
                            type: string
                            enum:
                              - PERMANENT
                              - CONTACT
                              - DELIVERY
                              - BILLING
                            description: Type of the address. Only some of the types are allowed in each
                              context.
                      description: Addresses. Only `PERMANENT` and `CONTACT` types are allowed.
                    tin:
                      type: string
                      description: Tax identification number (ICO). String values longer than 10
                        characters will be shortened to 10 characters.
                    ipAddress:
                      type: string
                      description: IPv4 or IPv6 address of a customer.
                    fingerprintComponents:
                      type: array
                      items:
                        type: object
                        properties:
                          key:
                            type: string
                            description: Key
                          value:
                            type: string
                            description: Value
                        required:
                          - key
                          - value
                      description: Fingerprints components.  Fill this property with data created with
                        HCO JS library.
                    extraData:
                      type: object
                      properties:
                        transactionsNumber:
                          type: number
                          description: Historical count of customer's cash transactions made in partner's
                            e-shop
                        cashlessTransactionsNumber:
                          type: number
                          description: Historical count of customer's cashless transactions made in
                            partner's e-shop
                        transactionsSum:
                          type: object
                          properties:
                            amount:
                              type: number
                              description: Amount in minor units (133000 represents 1330) [ISO
                                4217](https://en.wikipedia.org/wiki/ISO_4217)
                            currency:
                              type: string
                              description: Amount currency [ISO 4217](https://en.wikipedia.org/wiki/ISO_4217).
                                Only local currency is allowed (CZK in Czech
                                Republic and EUR in Slovakia).
                          required:
                            - amount
                            - currency
                          description: Sum of all cash transactions made in partner's e-shop
                        cashlessTransactionsSum:
                          type: object
                          properties:
                            amount:
                              type: number
                              description: Amount in minor units (133000 represents 1330) [ISO
                                4217](https://en.wikipedia.org/wiki/ISO_4217)
                            currency:
                              type: string
                              description: Amount currency [ISO 4217](https://en.wikipedia.org/wiki/ISO_4217).
                                Only local currency is allowed (CZK in Czech
                                Republic and EUR in Slovakia).
                          required:
                            - amount
                            - currency
                          description: Sum of all cashless transactions made in partner's e-shop
                        latestTransactionDate:
                          type: string
                          description: Newest transaction date on partner e-shop.
                        earliestTransactionDate:
                          type: string
                          description: Oldest transaction date on partner e-shop
                        pageTotalTime:
                          type: number
                          description: Total time spent on partners website (in seconds)
                        pageReviewsTime:
                          type: number
