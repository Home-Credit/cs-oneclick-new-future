  "/financing/v1/{application.merchantUrls.notificationEndpoint}":
    post:
      responses:
        "200":
          description: OK
          headers: {}
          content:
            application/json;charset=UTF-8:
              schema:
                type: object
                properties:
                  status:
                    type: string
                example:
                  status: OK
              examples:
                response:
                  value:
                    status: OK
        "400":
          description: Bad Request
          headers: {}
      summary: Application notification
      operationId: Application notification
      description: >-
        We use this resource when there is need to let you know about important
        changes within particular *application*. Namely in following situations:


        | Trigger                                                             | Corresponding Application.stateReason | Expected reaction                                                                                       |

        | ---                                                                 | ---                                   | ---                                                                                                     |

        | Application was approved (approval process is proceeding correctly) | PROCESSING_APPROVED                   | Do not cancel customer's order prematurely                                                              |

        | Application was rejected                                            | REJECTED                              | You should probably cancel respective order and release reserved goods                                  |

        | Application was cancelled (before delivery)                         | CANCELLED_NOT_PAID                    | You should probably cancel respective order and release reserved goods                                  |

        | Order to dispatch (we commit to finance customer's order)           | READY_TO_SHIP                         | Dispatch the order to the customer                                                                      |

        | Application is going to be paid out                                 | READY_PAID                            | Wait for us processing financial compensation with you                                                  |

        <!-- | Application was cancelled (after delivery)                          | CANCELLED_RETURNED                    | You should probably cancel respective order and process returning of the goods (if not already done so) |-->


        We fill the request with at least following information:

        - Application unique ID

        - Application state

        - Application substate

        - Down payment

        - Timestamp of the notification

        - Hashed message (check sum)


        > USEFUL NOTE: If you think it takes us unusually long time to send you particular notification, do not hesitate to use `/financing/v1/applications/{applicationId}` resource (where `{applicationId}` is the application ID you received in the response of `/financing/v1/applications` after its creation) to directly find out information you seek.


        Notify partner about changes in application.
      tags:
        - Merchantsite resources
      requestBody:
        content:
          application/json;charset=UTF-8:
            schema:
              type: object
              properties:
                id:
                  type: string
                  description: Unique identifier in HCO
                state:
                  type: string
                  enum:
                    - PROCESSING
                    - READY
                    - REJECTED
                    - CANCELLED
                  description: Application state.
                stateReason:
                  type: string
                  enum:
                    - PROCESSING_REDIRECT_NEEDED
                    - PROCESSING_PREAPPROVED
                    - PROCESSING_APPROVED
                    - PROCESSING_REVIEW
                    - PROCESSING_ALT_OFFER
                    - PROCESSING_SIGNED
                    - READY_TO_SHIP
                    - READY_SHIPPED
                    - READY_DELIVERING
                    - READY_DELIVERED
                    - READY_PAID
                    - REJECTED
                    - CANCELLED_NOT_PAID
                    - CANCELLED_RETURNED
                  description: Describes internal state of application, e.g. when state is
                    PROCESSING - reason why application remains in processing
                    state
                orderNumber:
                  type: string
                  description: Order number (internal for e-shop)
                notificationDate:
                  type: string
                orderState:
                  type: string
                  enum:
                    - PROCESSING
                    - SENT
                    - DELIVERED
                    - RETURNED
                    - CANCELLED
                  description: Order state.
                downPayment:
                  type: object
                  properties:
                    amount:
                      type: number
                      description: Amount in minor units (300000 represents 3 000) [ISO
                        4217](https://en.wikipedia.org/wiki/ISO_4217)
                    currency:
                      type: string
                      description: Amount currency [ISO 4217](https://en.wikipedia.org/wiki/ISO_4217).
                        Only local currency is allowed (CZK in Czech Republic
                        and EUR in Slovakia).
                  required:
                    - amount
                    - currency
                  description: Current down payment set by a customer
                sentDate:
                  type: string
                checkSum:
                  type: string
                sequenceNumber:
                  type: number
                  description: Sequence number of notification for corresponding application.
                    Starts at value of 1.
              required:
                - id
                - state
                - stateReason
                - orderNumber
                - notificationDate
                - orderState
                - downPayment
                - sentDate
                - checkSum
                - sequenceNumber
              example:
                id: 01-11200a0ee1
                state: PROCESSING
                stateReason: PROCESSING_APPROVED
                orderNumber: AA234
                notificationDate: 2017-07-15T00:00:00+02:00
                orderState: PROCESSING
                downPayment:
                  amount: 300000
                  currency: CZK
                sentDate: 2017-07-16T00:00:00+02:00
                checkSum: 443E150D3406F6A8DC62C1DB224AFDD84FA9907071BB1AD9B2C7701031793662191501B26AADF3A31361341EA176C80B23D8A9A5E5B5219538289945FE0C20A7
                sequenceNumber: 1
  "/verdun-train/app-flow/v1/applications/{applicationId}/changeState":
    servers:
      - url: https://apicz-test.homecredit.cz
    post:
      responses:
        "200":
          description: OK
          headers: {}
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: "#/components/schemas/ApplicationBase"
              examples:
                response:
                  value:
                    id: 01-11200a0ee1
                    state: PROCESSING
                    stateReason: PROCESSING_REDIRECT_NEEDED
        "404":
          description: Application does not exist
          headers: {}
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: "#/components/schemas/ErrorsNotFound"
              examples:
                response:
                  value:
                    errors:
                      - code: APPLICATION_NOT_FOUND
                        message: Application 'NONEXISTING_APPLICATION' not found
                        severity: ERROR
                        attribute: Client.addresses[1].streetNumber
                        ticketId: UAT1:AMS:20160516-091658.450:45e4
        "422":
          description: Transition is not allowed
          headers: {}
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: "#/components/schemas/ErrorsNotSupported"
              examples:
                response:
                  value:
                    errors:
                      - code: NOT_SUPPORTED
                        message: Current application status not allows requested operation
                        severity: ERROR
                        attribute: Client.addresses[1].streetNumber
                        ticketId: UAT1:AMS:20160516-091658.450:45e4
      summary: Change application state - integration usage
      operationId: Change application state - integration usage
      description: >-
        Use this resource for changing Application state (`stateReason`) to
        desired one. Following table contains allowed transitions for this
        resource.


        | Current stateReason of Application (from) | Available transitions (to)                                                                    |

        | ---                                       | ---                                                                                           |

        | `PROCESSING_REDIRECT_NEEDED`              | `PROCESSING_APPROVED`, `PROCESSING_SIGNED`, `READY_TO_SHIP`, `REJECTED`, `CANCELLED_NOT_PAID` |

        | `PROCESSING_APPROVED`                     | `PROCESSING_SIGNED`, `READY_TO_SHIP`, `CANCELLED_NOT_PAID`                                    |

        | `PROCESSING_SIGNED`                       | `READY_TO_SHIP`, `CANCELLED_NOT_PAID`                                                         |

        | `READY_SHIPPED`                           | `CANCELLED_NOT_PAID`                                                                          |

        | `READY_DELIVERED`                         | `CANCELLED_RETURNED`                                                                          |


        > NOTE: This action simulates real application process, which means that Application may be moved through one or multiple steps (`stateReason`) - as described in state diagram [State diagram of Application](https://github.com/mdostal-hci/oneclick-images/raw/master/StateDiagramApplication.png). That is why you may receive multiple notifications about changes of Application's state. Example: if you request change from `PROCESSING_REDIRECT_NEEDED` to `READY_TO_SHIP`, you will receive `PROCESSING_APPROVED` and `READY_TO_SHIP` notifications.


        > NOTE: As you may see no transition from `READY_TO_SHIP` is allowed for `https://apicz-test.homecredit.cz/verdun-train/app-flow/v1/applications/{applicationId}/changeState` resource. You should use 'Mark order as...' resources according to your Order life cycle.


        + Parameters
            + applicationId (string, required, `01-11200a0ee1`)
      tags:
        - Testing & Integration
      parameters:
        - name: applicationId
          in: path
          description: ""
          required: true
          example: 01-11200a0ee1
          schema:
            type: string
      requestBody:
        content:
          application/json;charset=UTF-8:
            schema:
              type: object
              properties:
                stateReason:
                  type: string
                  enum:
                    - REJECTED
                    - PROCESSING_APPROVED
                    - PROCESSING_SIGNED
                    - READY_TO_SHIP
                    - READY_DELIVERED
                    - READY_PAID
                    - CANCELLED_NOT_PAID
                    - CANCELLED_RETURNED
                  description: Describes internal state of application, e.g. when state is
                    PROCESSING - reason why application remains in processing
                    state
              required:
                - stateReason
              example:
                stateReason: REJECTED
tags:
  - name: Security
    description: >-
      To access our API, partner has to obtain *access token* first; this token
      is a string of arbitrary length (30+ chars) and it has to be included in
      HTTP header to every request to API. This section describes way to obtain
      valid access token and use it to access protected resources.


      - to obtain access token, use `/authentication/v1/partner` resource with appropriate parameters (see the [`/authentication/v1/partner` resource documentation](#reference/security/login-partner))


      - access token should be present in every request using request header `Authorization`, with type `Bearer`. If access token has value `secret_token`, it should be specified as follows:


      `Authorization: Bearer secret_token`


      So the real example using curl will look like:


      ```

      curl -H "Authorization: Bearer secret_token" https://api.homecredit.cz/financing/v1/applications

      ```


      - access token has limited time validity (for 2 hours). After it is expired, partner has to obtain new one using `/authentication/v1/partner` resource.


      - if partner fails to specify access token `401 Unauthorized` error and following response body is returned:


      ```

      {
         "error_description": "The access token is missing",
         "error": "invalid_request"
      }

      ```


      - if partner provides invalid access token `401 Unauthorized` error and following response body is returned:


      ```

      {
          "error_description":"The access token is invalid or has expired",
          "error":"invalid_token"
      }

      ```


      > IMPORTANT NOTE: Partner must keep his access token and login credentials safe. Login credentials nor access token should NEVER be put into client page. If partner plans to integrate API calls in client flow without submitting the page to server, he should implement REST endpoint bound to his shopping basket session, that will be used as a proxy to call HC API.


      > NEVER transfer access token nor login credentials over plain HTTP. Such requests will be refused.
  - name: Application resources
    description: Services that allows processing of *application* and *order* during
      their whole lifecycle.
  - name: Scoring resources
    description: Services that allow partner e-shops to find out a probability of
      *application's* approval.
  - name: Installments calculator resources
    description: >-
      When you want to provide your customer (that wants to pay for a purchase
      by a loan) an option to choose from available installment programs while
      he is still on your website, it is necessary to implement "installments
      calculator".


      Choose one of the following approaches to integrate installments calculator into your website:


      - A) Implementing your own installment calculator, with your FE in your design that uses designated API resources ([described below](#reference/installments-calculator-resources/implementing-own-installments-calculator)).


      - B) Integrating Home Credit's javascript widget (described in [special chapter](#reference/javascript-widget-integration)) that:
        - provides GUI and front-end functionalities
        - process all needed calculations
        - provides necessary data to e-shop's back-end in order to easily use them within [*application* creation request](#reference/application-resources/create-application)

      > NOTE: Implementation of installment calculator is optional. Customers can always use the installment calculator embedded in Home Credit's front-end.


      ## Implementing own installments calculator


      In order to implement your own installment calculator (with your GUI design) you will need following resources:


      - `/financing/v1/installmentProgramsOffers` - to find out available installment programs offers and their details


      - `/financing/v1/installmentPrograms` - to find out details of a chosen installment program


      - `/financing/v1/installmentProgramsDownPayments` - to find out down payment options within available installment programs offers
  - name: JavaScript widget integration
    description: In order to use Home Credit's javascript widget as an installment
      calculator, your e-shop back-end has to be configured properly. How to do
      it is currently described in [our on-line
      repository](https://github.com/homecreditcz/widget-calculator) (currently
      written in Czech).
  - name: Health check
    description: >-
      To easily find out current API state use the [API state check
      resource](#reference/api-status-check/api-status-check).

      To check the availability of back-end services use the [health check resource](#reference/health-check/health-check).
  - name: Merchantsite resources
    description: >-
      Services that should be developed and exposed by partner e-shops to allow
      HC asynchronously inform these partner e-shops about important changes
      regarding particular *applications* and *orders*


      > **ATTENTION:** This set of APIs is NOT exposed from HC. Instead, it should be developed by partner and accept calls specified below.
  - name: Testing & Integration
    description: >-
      This section should help new partner's e-shop developers with better
      understanding of the API and connected processes especially during early
      stages of the API integration.


      > Temporarily described on a [separate website](https://github.com/homecreditcz/oneclick-api) (currently only in Czech).


      This section also contains resources for easier integration to API.


      > NOTE: Valid access token is required for the usage of these resources (the same acces token used for the whole API)


      > NOTE: Those resources work only on testing and integration environments.
servers:
  - url: https://api.homecredit.cz
components:
  schemas:
    Orders: {}
    Precheck: {}
    MultiPrecheck: {}
    ApplicationRequest:
      type: object
      required:
