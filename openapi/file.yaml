      description: >-
        Multi precheck is basic Precheck run on many clients. Typically used
        outside businness hours. Operation is asynchronous, partner gets only
        unique identifier of batch and the result is available in Multi precheck
        result resource (see [this section](#reference/Multi precheck result))


        Resource has to be called with valid access token (see the [Security section](/#reference/scoring-resources/multi-precheck-result)) from your server. If you plan to integrate it in a client flow, you should implement REST endpoint bound to your shopping basket session that will be used as a proxy to call HC API - **NEVER put access token directly to client side**.


        Possible error codes explanation:

        | Status code | Code                | Explanation                                                                     |

        | ---         | ---                 | ---                                                                             |

        | 400         | INVALID_REQUEST     | Request was not well formatted (malformed request syntax, size too large, etc.) |

        | 500         | FAILURE             | Internal failure                                                                |
      tags:
