            type: string
          description: Array of all precheck ids related to this application. See
            [Precheck
            operation](#reference/scoring-resources/precheck/create-application)
            and it's response.
    ApplicationBase:
      type: object
      required:
        - id
        - state
        - stateReason
      properties:
        id:
          type: string
          example: 01-11200a0ee1
          description: Unique identifier in HCO
        state:
          type: string
          enum:
            - PROCESSING
            - READY
            - REJECTED
            - CANCELLED
          description: Application state.
        stateReason:
          type: string
          enum:
            - PROCESSING_REDIRECT_NEEDED
            - PROCESSING_PREAPPROVED
            - PROCESSING_APPROVED
            - PROCESSING_REVIEW
            - PROCESSING_ALT_OFFER
            - PROCESSING_SIGNED
            - READY_TO_SHIP
            - READY_SHIPPED
            - READY_DELIVERING
            - READY_DELIVERED
            - READY_PAID
            - REJECTED
            - CANCELLED_NOT_PAID
            - CANCELLED_RETURNED
          description: Describes internal state of application, e.g. when state is
            PROCESSING - reason why application remains in processing state
    Application:
      allOf:
        - $ref: "#/components/schemas/ApplicationBase"
        - type: object
          required:
            - order
            - type
            - settingsInstallment
          properties:
            customer:
              $ref: "#/components/schemas/CustomerBase"
            order:
              $ref: "#/components/schemas/Order"
            type:
              type: string
              enum:
                - INSTALLMENT
              description: Financing type
            settingsInstallment:
              $ref: "#/components/schemas/SettingsInstallment"
            gatewayRedirectUrl:
              type: string
              example: https://www.ourloan.cz/application/11200a0ee1
              description: Gateway redirect URL. Redirect user to this URL if state is
                `PROCESSING` and stateReason is `PROCESSING_REDIRECT_NEEDED`.
    CustomerBase:
      type: object
      properties:
        firstName:
          type: string
          example: John
