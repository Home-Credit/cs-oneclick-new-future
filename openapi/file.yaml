          headers: {}
          content:
            application/json;charset=UTF-8:
              schema:
                $ref: "#/components/schemas/Errors"
              examples:
                response:
                  value:
                    errors:
                      - code: BAD_REQUEST
                        message: Bad request
                        severity: ERROR
                        attribute: Client.addresses[1].streetNumber
                        ticketId: UAT1:AMS:20160516-091658.450:45e4
      summary: "[OBSOLETE] Run precheck"
      operationId: "[OBSOLETE] Run precheck"
      description: >-
        > **ATTENTION:** This resource is **!!OBSOLETE!!**. Druhá verze
        prechecku, již nenabízíme novým partnerům. Používá Mall a ještě jeden
        partner


        Simple operation for customer preliminary scoring. Returns a suitability of particular customer for financing services. It is best suitable for identifying clients who will probably be rejected. Take into account that positive recommendation can not guarantee customer's approval (it is not the main scoring) as the result is based on only a few elementary pieces of information about the customer.


        Resource has to be called with valid access token (see the [Security section](#reference/security)) from your server. If you plan to integrate it in a client flow, you should implement REST endpoint bound to your shopping basket session that will be used as a proxy to call HC API - **NEVER put access token directly to client side**.


        Possible error codes explanation:

        | Status code | Code                | Explanation                                                                     |

        | ---         | ---                 | ---                                                                             |

        | 400         | INVALID_REQUEST     | Request was not well formatted (malformed request syntax, size too large, etc.) |

        | 500         | FAILURE             | Internal failure                                                                |
      tags:
        - Scoring resources
      requestBody:
        content:
          application/json;charset=UTF-8:
            schema:
              type: object
              properties:
                customer:
                  type: object
                  properties:
                    firstName:
                      type: string
                      description: Customer first (given) name. Must be paired with `lastName`. SHOULD
                        be provided if known. String values longer than 100
                        characters will be shortened to 100 characters.
                    lastName:
                      type: string
                      description: Customer last (family) name. Must be paired with `firstName`.
                        SHOULD be provided if known. String values longer than
                        100 characters will be shortened to 100 characters.
                    fullName:
                      type: string
                      description: Customer full name, including academical degrees and salutation.
                        Attribute `fullName` is parsed (and eventually
                        shortened) into `firstName` and `lastName`; `fullName`
                        is never returned in response.
                    email:
                      type: string
                      description: E-mail address of customer. Must be valid email according to [RFC
                        2822](https://tools.ietf.org/html/rfc2822).
                    phone:
                      type: string
                      description: Mobile phone number with country code (including leading `+`)
                    addresses:
                      type: array
                      items:
                        type: object
                        properties:
                          name:
                            type: string
                            description: Name on addres. Maximum 90 characters.
                          city:
                            type: string
                            description: City. String values longer than 100 characters will be shortened to
                              100 characters.
                          streetAddress:
                            type: string
                            description: Street/city part. String values longer than 100 characters will be
                              shortened to 100 characters.
                          streetNumber:
                            type: string
                            description: Street number. String values longer than 50 characters will be
                              shortened to 50 characters.
                          zip:
                            type: string
                            description: Postal code. String values longer than 10 characters will be
                              shortened to 10 characters.
                          addressType:
                            type: string
                            enum:
                              - PERMANENT
                              - CONTACT
                              - DELIVERY
                              - BILLING
                            description: Type of the address. Only some of the types are allowed in each
                              context.
                      description: Addresses. Only `PERMANENT` and `CONTACT` types are allowed.
                    tin:
                      type: string
                      description: Tax identification number (ICO). String values longer than 10
                        characters will be shortened to 10 characters.
                    ipAddress:
                      type: string
                      description: IPv4 or IPv6 address of a customer.
                    fingerprintComponents:
                      type: array
                      items:
                        type: object
                        properties:
                          key:
                            type: string
                            description: Key
                          value:
                            type: string
                            description: Value
                        required:
                          - key
                          - value
                      description: Fingerprints components.  Fill this property with data created with
                        HCO JS library.
                    extraData:
                      type: object
                      properties:
                        transactionsNumber:
                          type: number
                          description: Historical count of customer's cash transactions made in partner's
                            e-shop
                        cashlessTransactionsNumber:
                          type: number
                          description: Historical count of customer's cashless transactions made in
                            partner's e-shop
                        transactionsSum:
                          type: object
                          properties:
                            amount:
                              type: number
                              description: Amount in minor units (133000 represents 1330) [ISO
                                4217](https://en.wikipedia.org/wiki/ISO_4217)
                            currency:
                              type: string
                              description: Amount currency [ISO 4217](https://en.wikipedia.org/wiki/ISO_4217).
                                Only local currency is allowed (CZK in Czech
                                Republic and EUR in Slovakia).
                          required:
                            - amount
                            - currency
                          description: Sum of all cash transactions made in partner's e-shop
                        cashlessTransactionsSum:
                          type: object
                          properties:
                            amount:
                              type: number
                              description: Amount in minor units (133000 represents 1330) [ISO
                                4217](https://en.wikipedia.org/wiki/ISO_4217)
                            currency:
                              type: string
                              description: Amount currency [ISO 4217](https://en.wikipedia.org/wiki/ISO_4217).
                                Only local currency is allowed (CZK in Czech
                                Republic and EUR in Slovakia).
                          required:
                            - amount
                            - currency
                          description: Sum of all cashless transactions made in partner's e-shop
                        latestTransactionDate:
                          type: string
                          description: Newest transaction date on partner e-shop.
                        earliestTransactionDate:
                          type: string
                          description: Oldest transaction date on partner e-shop
                        pageTotalTime:
                          type: number
                          description: Total time spent on partners website (in seconds)
                        pageReviewsTime:
                          type: number
                          description: Total time spent on partners website in review and comments
                            sections (in seconds)
                        cartItemsRemoved:
                          type: number
                          description: Total count of removed items form shopping basket during current
                            shopping
                        itemsViewed:
                          type: number
                          description: Number of viewed pages with products
                      description: Additional data, that may improve the approval probability.
                  description: Customer data
              required:
                - customer
              example:
                customer:
                  firstName: John
                  lastName: Newborn
                  fullName: Ing. John Newborn, Csc.
                  email: john.newborn@country.com
                  phone: "+420777123456"
                  addresses:
                    - name: John Newborn
                      city: Prague
                      streetAddress: Letenská
                      streetNumber: "22"
                      zip: 140 00
                      addressType: PERMANENT
                  tin: "12333321"
                  ipAddress: 172.10.10.1
                  fingerprintComponents:
                    - key: property
                      value: value
                  extraData:
                    transactionsNumber: 10
                    cashlessTransactionsNumber: 5
                    transactionsSum:
                      amount: 133000
                      currency: CZK
                    cashlessTransactionsSum:
                      amount: 133000
                      currency: CZK
                    latestTransactionDate: 2017-01-10
                    earliestTransactionDate: 2015-10-12
                    pageTotalTime: 250
                    pageReviewsTime: 100
                    cartItemsRemoved: 2
                    itemsViewed: 10
