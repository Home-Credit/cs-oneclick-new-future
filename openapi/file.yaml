      description: >-
        When a customer wants to pay for a purchase by a loan and you want to
        show him an offer of available installment programs, use
        `/financing/v1/installmentProgramsOffers` resource with properly filled
        request that contains at least following data:

        - Product set code (you should know the proper product set code from Home Credit's sales representative or other similar source; if you don't provide product set code, your default product set will be used)

        - Price of customer's purchase


        If the request was successfully processed, you receive HTTP status code 200 and array of objects of available installment programs with at least following information in the response:

        - Installment program (array)
          - Installment program product code
          - Installment program type (in case of only one installment program offer in response it is of type `FAVOURITE`)
          - Installment amount
          - Number of installments

        In other cases, you receive one of the following errors:

        | Status code | Code                  | Explanation                                                                      |

        | ---         | ---                   | ---                                                                              |

        | 400         | INVALID_REQUEST       | Request was not well formatted (malformed request syntax, size too large, etc.)  |

        | 422         | UNPROCESSABLE         | The request was well-formed but was unable to be followed due to semantic errors |

        | 500         | INTERNAL_SERVER_ERROR | Unexpected condition was encountered and no more specific message is suitable    |


        Calculate installment programs offer according to specified input


        feature | supported by resource

        --- | ---

        [paging](#header-paging) | no

        [sorting](#header-sorting) | no

        [filtering](#header-filtering) | no
