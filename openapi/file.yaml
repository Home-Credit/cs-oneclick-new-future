      requestBody:
        content:
          application/json;charset=UTF-8:
            schema:
              type: object
              properties:
                scoringData:
                  type: array
                  items:
                    type: object
                    properties:
                      customer:
                        type: object
                        properties:
                          firstName:
                            type: string
                            description: Customer first (given) name. String values longer than 100
                              characters will be shortened to 100 characters.
                          lastName:
                            type: string
                            description: Customer last (family) name. String values longer than 100
                              characters will be shortened to 100 characters.
                          email:
                            type: string
                            description: E-mail address of customer. MUST be valid email according to [RFC
                              2822](https://tools.ietf.org/html/rfc2822).
                          phone:
                            type: string
                            description: Mobile phone number with country code (including leading `+`).
                          externalId:
                            type: string
                            description: Unique customer's identifier in partner's system. Typically used
                              for linking request and response together.
                        required:
                          - firstName
                          - lastName
                          - email
                          - phone
                          - externalId
                        description: Customer data
                    required:
                      - customer
                notificationEndpoint:
                  type: string
                  description: URL of the partner used as a notification endpoint for providing
                    information about result of multi precheck. Must be valid
                    URL according to [RFC
                    3986](https://tools.ietf.org/html/rfc3986). Maximum 1000
                    characters.
              required:
                - scoringData
              example:
                scoringData:
                  - customer:
                      firstName: John
                      lastName: Newborn
                      email: john.newborn@country.com
                      phone: "+420777123456"
