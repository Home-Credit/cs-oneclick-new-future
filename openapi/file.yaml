      summary: Get application detail
      operationId: Get application detail
      description: >-
        If you need to find out current information about particular
        *application* - primarily its state and other details - use
        `/financing/v1/applications/{applicationId}` resource where
        `{applicationId}` is the *application* ID you received in the response
        of `/financing/v1/applications` after its creation.


        | Financing type     | Supported         |

        | ---                | ---               |

        | `INSTALLMENT`      | YES               |


        If the request was successfully processed, you receive HTTP status code 200 and *application* object with at least following information in the response:

        - Application unique ID

        - Application type

        - Application state

        - Application substate

        - Gateway redirect URL


        > You may also receive information about current **down payment** which is useful when you need to find out whether customer's loan was approved with different down payment than had been initially set in your embedded installment calculator.


        In other cases, you receive one of the following errors:

        | Status code | Code                  | Message                                                                          |

        | ---         | ---                   | ---                                                                              |

        | 400         | INVALID_REQUEST       | Request was not well formatted (malformed request syntax, size too large, etc.)  |

        | 404         | APPLICATION_NOT_FOUND | The requested resource could not be found                                        |

        | 422         | NOT_SUPPORTED         | Resource is not supported for given financing type                               |

        | 422         | UNPROCESSABLE         | The request was well-formed but was unable to be followed due to semantic errors |

        | 500         | INTERNAL_SERVER_ERROR | Unexpected condition was encountered and no more specific message is suitable    |


        + Parameters
            + applicationId (string, required, `01-11200a0ee1`)

        Get specific *application* detail by ID
      tags:
        - Application resources
      parameters:
        - name: applicationId
          in: path
          description: ""
          required: true
          example: 01-11200a0ee1
          schema:
            type: string
